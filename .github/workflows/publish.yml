name: publish
on:
  push:
    branches: [main]
    paths: ['apps/**', 'scripts/**', '.github/workflows/publish.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node scripts/build-apps.mjs
      - run: node scripts/pack-and-index.mjs
      - name: Publish versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "apps-v${{ github.run_number }}" out/*.tgz index.json \
            --title "apps v${{ github.run_number }}" --latest --notes "app bundles (run ${{ github.run_number }})"
