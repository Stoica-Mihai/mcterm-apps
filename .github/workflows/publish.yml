name: publish
on:
  push:
    branches: [main]
    paths: ['apps/**', 'scripts/**', '.github/workflows/publish.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node scripts/build-apps.mjs
      - run: node scripts/pack-and-index.mjs
      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete apps --yes --cleanup-tag || true
          gh release create apps out/*.tgz --title apps --notes "rolling app bundles"
      - name: Commit index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet index.json; then
            git add index.json
            git commit -m "ci: regenerate index.json [skip ci]"
            git push
          fi
